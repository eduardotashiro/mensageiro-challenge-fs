services:
  postgres:
    image: postgres:15-alpine
    container_name: mensageiro_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: mensageiro_backend
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?schema=public
      - JWT_SECRET=sua_chave_secreta_aqui
      - CORS_ORIGIN=http://localhost:8080
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    container_name: mensageiro_web
    ports:
      - "8080:80"  
    depends_on:
      - backend

volumes:
  postgres_data: